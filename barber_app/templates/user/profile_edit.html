{% extends 'shared/base.html' %}

{% block title %}Edit Profile - Online Barber{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card mt-4 mb-4">
                <div class="card-header">
                    <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Profile</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="id_first_name" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="id_first_name" name="first_name" value="{{ user.first_name }}" placeholder="First Name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="id_last_name" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="id_last_name" name="last_name" value="{{ user.last_name }}" placeholder="Last Name">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="id_email" name="email" value="{{ user.email }}" placeholder="Email Address">
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_phone" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="id_phone" name="phone" value="{{ user.phone }}" placeholder="Phone Number">
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_dateofbirth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="id_dateofbirth" name="dateofbirth" value="{{ user.dateofbirth|date:'Y-m-d' }}">
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_address" class="form-label">Address</label>
                            <textarea class="form-control" id="id_address" name="address" rows="3" placeholder="Your Address">{{ user.address }}</textarea>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'user_profile' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
