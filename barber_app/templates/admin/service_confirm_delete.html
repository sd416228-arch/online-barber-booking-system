{% extends 'shared/base.html' %}

{% block title %}Delete Service - Online Barber{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card mt-5 mb-5">
                <div class="card-body p-4 text-center">
                    <i class="fas fa-exclamation-triangle" style="font-size: 60px; color: #dc3545;"></i>
                    <h4 class="mt-3 mb-2">Delete Service?</h4>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete <strong>{{ service.name }}</strong>? This action cannot be undone.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <a href="{% url 'admin_service_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash"></i> Delete Service
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
